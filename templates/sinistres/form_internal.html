{% extends 'sinistres/form.html' %}
{% block content %}
<div class="max-w-2xl">
    <h1 class="text-2xl font-bold mb-6">{{ title }}</h1>
    <form method="post" class="card p-6 space-y-4">
        {% csrf_token %}
        <div><label class="block text-sm font-medium mb-1">Client</label>
            <select name="client_id" class="form-input" required>
                {% for c in clients %}<option value="{{ c.pk }}" {% if selected_client and selected_client.pk == c.pk %}selected{% endif %}>{{ c.display_name }}</option>{% endfor %}
            </select>
        </div>
        {% for field in form %}<div><label class="block text-sm font-medium mb-1">{{ field.label }}</label>{{ field }}</div>{% endfor %}
        <button type="submit" class="btn-primary">Créer</button>
    </form>
</div>
{% endblock %}
