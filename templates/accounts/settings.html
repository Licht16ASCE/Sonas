{% extends 'base.html' %}
{% block title %}Paramètres{% endblock %}
{% block content %}
<div class="max-w-xl">
    <div class="sonas-page-header mb-8">
        <h1>Paramètres</h1>
        <p>Personnalisez votre expérience SONAS</p>
    </div>
    <form method="post" class="sonas-card p-6 space-y-6">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium mb-3">Thème d'affichage</label>
            <div class="space-y-2">
                {% for value, label in theme_choices %}
                <label class="flex items-center gap-3 p-3 rounded-xl border border-slate-200 dark:border-slate-700 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800/50">
                    <input type="radio" name="theme" value="{{ value }}" {% if user.theme_preference == value %}checked{% endif %} class="text-indigo-600">
                    <span class="text-sm font-medium">{{ label }}</span>
                </label>
                {% endfor %}
            </div>
        </div>
        <button type="submit" class="sonas-btn sonas-btn-primary">Enregistrer</button>
    </form>
</div>
{% endblock %}
