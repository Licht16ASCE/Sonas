{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="max-w-2xl">
    <div class="sonas-page-header mb-8">
        <h1>{{ title }}</h1>
        <p>Le compte sera créé avec le rôle Agent</p>
    </div>
    <form method="post" class="sonas-card p-6 space-y-4">
        {% csrf_token %}
        {% for field in form %}
        <div>
            <label class="sonas-label">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<p class="text-sm text-red-600 mt-1">{{ field.errors.0 }}</p>{% endif %}
        </div>
        {% endfor %}
        <div class="flex gap-3 pt-2">
            <button type="submit" class="sonas-btn sonas-btn-primary">Créer l'agent</button>
            <a href="{% url 'accounts_team:list' %}" class="sonas-btn sonas-btn-secondary">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
