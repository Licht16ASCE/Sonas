{% extends 'base.html' %}
{% block title %}Activités{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">Historique d'activités</h1>
<div class="card divide-y divide-gray-100 dark:divide-gray-700">
    {% for a in activites %}
    <div class="p-4 flex justify-between">
        <div>
            <p class="font-medium">{{ a.get_type_activite_display }}</p>
            <p class="text-sm text-gray-500">{{ a.description }}</p>
        </div>
        <span class="text-sm text-gray-400">{{ a.created_at|date:"d/m/Y H:i" }}</span>
    </div>
    {% empty %}
    <p class="p-6 text-gray-500 text-center">Aucune activité.</p>
    {% endfor %}
</div>
{% endblock %}
