{% if messages %}
<div class="mb-5 space-y-2">
    {% for message in messages %}
    <div class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium
        {% if message.tags == 'success' %}bg-emerald-50 dark:bg-emerald-950/40 text-emerald-800 dark:text-emerald-200 border border-emerald-200 dark:border-emerald-800
        {% elif message.tags == 'error' %}bg-red-50 dark:bg-red-950/40 text-red-800 dark:text-red-200 border border-red-200 dark:border-red-800
        {% else %}bg-indigo-50 dark:bg-indigo-950/40 text-indigo-800 dark:text-indigo-200 border border-indigo-200 dark:border-indigo-800{% endif %}">
        {{ message }}
    </div>
    {% endfor %}
</div>
{% endif %}
