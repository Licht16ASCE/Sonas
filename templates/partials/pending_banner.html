{% if pending_actions_count %}
<div class="mb-6 sonas-card p-4 border-l-4 border-l-amber-400 bg-amber-50/50 dark:bg-amber-950/20">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
        <div>
            <p class="font-bold text-amber-800 dark:text-amber-200">
                {{ pending_actions_count }} action{{ pending_actions_count|pluralize }} en attente
            </p>
            <p class="text-sm text-amber-700/80 dark:text-amber-300/70 mt-0.5">Reprenez vos tâches incomplètes pour finaliser vos dossiers.</p>
        </div>
        <a href="{% url url_pending_actions %}" class="sonas-btn sonas-btn-warning sonas-btn-sm shrink-0">Voir les actions</a>
    </div>
</div>
{% endif %}
