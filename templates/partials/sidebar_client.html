<aside
  class="hidden lg:flex flex-col shrink-0 sonas-card border-0 border-r rounded-none min-h-screen transition-all duration-200"
  :class="collapsed ? 'w-[4.5rem]' : 'w-64'"
  x-data="{ collapsed: JSON.parse(localStorage.getItem('sonas-sidebar-collapsed') || 'false') }"
  x-init="$watch('collapsed', v => localStorage.setItem('sonas-sidebar-collapsed', JSON.stringify(v)))"
>
    <div class="p-5 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between gap-2">
        <a href="{% url 'clients_client:dashboard' %}" class="flex items-center gap-2.5 min-w-0" x-show="!collapsed">
            <div class="w-9 h-9 shrink-0 rounded-xl bg-gradient-to-br from-indigo-600 to-indigo-500 flex items-center justify-center shadow-md shadow-indigo-500/20">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
            </div>
            <span class="text-lg font-extrabold tracking-tight">SONAS</span>
        </a>
        <button type="button" @click="collapsed = !collapsed" class="p-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 shrink-0 ml-auto">
            <svg class="w-4 h-4 text-slate-500 transition-transform" :class="collapsed && 'rotate-180'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/></svg>
        </button>
    </div>
    <p class="px-5 pt-3 text-xs text-slate-500 font-medium" x-show="!collapsed">Mon espace client</p>
    <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
        <a href="{% url 'clients_client:dashboard' %}" class="sonas-sidebar-link" title="Dashboard">
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            <span x-show="!collapsed">Dashboard</span>
        </a>
        <a href="{% url 'clients_client:profile' %}" class="sonas-sidebar-link" title="Mon profil">
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            <span x-show="!collapsed">Mon profil</span>
        </a>
        <a href="{% url 'biens_client:list' %}" class="sonas-sidebar-link" title="Mes biens">
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
            <span x-show="!collapsed">Mes biens</span>
        </a>
        <a href="{% url 'contrats_client:list' %}" class="sonas-sidebar-link" title="Mes contrats">
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            <span x-show="!collapsed">Mes contrats</span>
        </a>
        <a href="{% url 'sinistres_client:list' %}" class="sonas-sidebar-link" title="Mes sinistres">
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
            <span x-show="!collapsed">Mes sinistres</span>
        </a>
        <a href="{% url 'documents_client:list' %}" class="sonas-sidebar-link" title="Documents">
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
            <span x-show="!collapsed">Documents</span>
        </a>
        <a href="{% url url_pending_actions %}" class="sonas-sidebar-link" title="Actions en attente">
            <svg class="w-5 h-5 shrink-0 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <span x-show="!collapsed">Actions en attente</span>
            {% if pending_actions_count %}<span class="ml-auto sonas-badge sonas-badge-yellow" x-show="!collapsed">{{ pending_actions_count }}</span>{% endif %}
        </a>
        <a href="{% url url_notifications_list %}" class="sonas-sidebar-link" title="Notifications">
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
            <span x-show="!collapsed">Notifications</span>
            {% if unread_notifications_count %}<span class="ml-auto sonas-badge sonas-badge-red" x-show="!collapsed">{{ unread_notifications_count }}</span>{% endif %}
        </a>
        <a href="{% url 'accounts:settings' %}" class="sonas-sidebar-link" title="Paramètres">
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            <span x-show="!collapsed">Paramètres</span>
        </a>
    </nav>
</aside>
